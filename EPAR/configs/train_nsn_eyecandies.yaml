# ================================================================
# train_nsn.py  --  Stage 2 (NSN / Memory Bank) | Eyecandies
# ================================================================

# ── Dataset ─────────────────────────────────────────────────
dataset_type: eyecandies
dataset_path: ./datasets
output_dir: ./outputs
camera_param_route: ./datasets/eyecandies/

# ── Checkpoint paths ─────────────────────────────────────────
visual_encoder_ckpt_pth: ./checkpoints/vit_base_patch8_224_dino.pth
point_encoder_ckpt_pth:  ./checkpoints/pointmae_pretrain.pth
stage1_ckpt_subdir: 1st_stage_eyecandies
# Naming convention for Stage-1 checkpoint files (eyecandies / new version):
#   RGB : {class_name}_best_jepa_rgb_dino_new.pth
#   XYZ : {class_name}_best_jepa_xyz_pmae_new.pth
stage2_ckpt_subdir: 2nd_stage_eyecandies

# ── Model sizes ──────────────────────────────────────────────
visual_encoder_size: base
point_encoder_size:  base
encoder_size:        vit_small
predictor_depth:     2

# ── Training defaults ────────────────────────────────────────
batch_size:          1
num_epochs:          5
num_workers:         4
k_shot:              -1

# ── Point cloud ──────────────────────────────────────────────
group_size:  128
num_group:   1024

# ── Image / patch ────────────────────────────────────────────
img_size:    224
patch_size:  8
seed:        42

# ── Mask / target block ──────────────────────────────────────
pred_mask_scale: [0.15, 0.2]
aspect_ratio:    [0.75, 1.5]
npred:           4
min_keep:        6
bg_ratio_threshold: 0.95
bg_threshold:    90

# ── EMA ──────────────────────────────────────────────────────
ema_params_rgb: [0.995, 1.000]
ema_params_3d:  [0.995, 1.000]
warmup_epochs:  1
usage_half_precision: false

# ── Optimizer defaults ───────────────────────────────────────
start_lr_rgb:   1.0e-6
final_lr_rgb:   1.0e-6
lr_rgb:         1.0e-5
start_lr_xyz:   1.0e-6
final_lr_xyz:   1.0e-6
lr_xyz:         1.0e-5
weight_decay:   0.01
final_weight_decay: 0.1
ipe_scale:      1.0

# ── Coreset ──────────────────────────────────────────────────
coreset_percentage_rgb: 0.1
coreset_percentage_xyz: 0.1

# ── Run mode ─────────────────────────────────────────────────
mode: combined
epoch_num: 1

# ── Memory bank optimizer ────────────────────────────────────
# LR used for opt_rgb_bank / opt_xyz_bank (AdamW)
bank_lr: 1.0e-5   # default; override to 1e-4 for CandyCane, HazelnutTruffle

# ── Per-class hyperparameter overrides ───────────────────────
classes:
  CandyCane:
    num_epochs: 5
    epoch_num: 1
    bg_threshold: 90
    bank_lr: 1.0e-4   # faster bank update needed

  ChocolateCookie:
    num_epochs: 5
    epoch_num: 1
    bg_threshold: 90

  ChocolatePraline:
    num_epochs: 5
    epoch_num: 1
    bg_threshold: 70

  Confetto:
    num_epochs: 5
    epoch_num: 1
    bg_threshold: 90

  GummyBear:
    num_epochs: 5
    epoch_num: 1
    bg_threshold: 90

  HazelnutTruffle:
    num_epochs: 4
    epoch_num: 1
    bg_threshold: 90
    bank_lr: 1.0e-4   # faster bank update needed

  LicoriceSandwich:
    num_epochs: 4
    epoch_num: 1
    bg_threshold: 90

  Lollipop:
    num_epochs: 5
    epoch_num: 1
    bg_threshold: 90

  Marshmallow:
    num_epochs: 5
    start_lr_xyz: 1.0e-5
    final_lr_xyz: 1.0e-5
    lr_xyz: 1.0e-5
    epoch_num: 1
    bg_threshold: 90

  PeppermintCandy:
    num_epochs: 5
    start_lr_xyz: 1.0e-5
    final_lr_xyz: 1.0e-5
    lr_xyz: 1.0e-5
    epoch_num: 1
    bg_threshold: 90
