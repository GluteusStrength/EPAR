# ============================================================
# train_adapt.py  --  Stage 1 (JEPA Adaptation) | MVTec-3D AD
# ============================================================

# ── Dataset ─────────────────────────────────────────────────
dataset_type: mvtec
dataset_path: ./datasets/
output_dir: ./outputs
camera_param_route: ./datasets/mvtec/

# ── Checkpoint paths ─────────────────────────────────────────
visual_encoder_ckpt_pth: ./checkpoints/vit_base_patch8_224_dino.pth
point_encoder_ckpt_pth:  ./checkpoints/pointmae_pretrain.pth
# Saved checkpoint dir (sub-dir inside output_dir)
ckpt_subdir: 1st_stage_mvtec

# ── Model sizes ──────────────────────────────────────────────
visual_encoder_size: base
point_encoder_size:  base
encoder_size:        vit_small
predictor_depth:     2

# ── Training defaults ────────────────────────────────────────
batch_size:          1
num_epochs:          5          # can be overridden per class
num_workers:         4
accumulation_steps:  8
k_shot:              -1

# ── Point cloud ──────────────────────────────────────────────
group_size:  128
num_group:   1024

# ── Image / patch ────────────────────────────────────────────
img_size:    224
patch_size:  8
seed:        42

# ── Mask / target block ──────────────────────────────────────
pred_mask_scale: [0.15, 0.2]
aspect_ratio:    [0.75, 1.5]
npred:           4
min_keep:        6
bg_ratio_threshold: 0.9
bg_threshold:    30              # can be overridden per class

# ── EMA ──────────────────────────────────────────────────────
ema_params_rgb: [0.995, 1.000]
ema_params_3d:  [0.995, 1.000]
warmup_epochs:  1
usage_half_precision: false

# ── Optimizer defaults ───────────────────────────────────────
start_lr_rgb:   1.0e-6
final_lr_rgb:   1.0e-6
lr_rgb:         1.0e-5
start_lr_xyz:   1.0e-6          # can be overridden per class
final_lr_xyz:   1.0e-6
lr_xyz:         1.0e-5
weight_decay:   0.01
final_weight_decay: 0.1
ipe_scale:      1.0

# ── Coreset ──────────────────────────────────────────────────
coreset_percentage_rgb: 0.1
coreset_percentage_xyz: 0.1

# ── Dataset-specific flags (auto-set) ────────────────────────
#   lora_mode: full            (mvtec uses full fine-tuning blocks)
#   use_rect_target: true
#   use_bg_exclusion: true

# ── Per-class hyperparameter overrides ───────────────────────
classes:
  bagel:
    num_epochs: 10
    start_lr_xyz: 1.0e-6
    final_lr_xyz: 1.0e-6
    lr_xyz: 1.0e-5

  cable_gland:
    num_epochs: 12
    start_lr_xyz: 1.0e-5
    final_lr_xyz: 1.0e-5
    lr_xyz: 1.0e-4

  carrot:
    num_epochs: 10
    min_keep: 4
    start_lr_xyz: 1.0e-6
    final_lr_xyz: 1.0e-6
    lr_xyz: 1.0e-5

  cookie:
    num_epochs: 1
    start_lr_xyz: 1.0e-7
    final_lr_xyz: 1.0e-7
    lr_xyz: 1.0e-6

  dowel:
    num_epochs: 4
    start_lr_xyz: 1.0e-7
    final_lr_xyz: 1.0e-7
    lr_xyz: 1.0e-6

  foam:
    num_epochs: 10
    start_lr_xyz: 1.0e-5
    final_lr_xyz: 1.0e-5
    lr_xyz: 1.0e-4

  peach:
    num_epochs: 10
    start_lr_xyz: 1.0e-6
    final_lr_xyz: 1.0e-6
    lr_xyz: 1.0e-5

  potato:
    num_epochs: 5
    start_lr_xyz: 1.0e-6
    final_lr_xyz: 1.0e-6
    lr_xyz: 1.0e-5

  rope:
    num_epochs: 5
    start_lr_xyz: 1.0e-5
    final_lr_xyz: 1.0e-5
    lr_xyz: 1.0e-4

  tire:
    num_epochs: 10
    start_lr_xyz: 1.0e-6
    final_lr_xyz: 1.0e-6
    lr_xyz: 1.0e-5
